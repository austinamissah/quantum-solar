name: tests

on:
  push:
  pull_request:
  schedule:
    # Mondays 06:00 UTC — full suite including the slow quantum (QAOA) tests.
    - cron: "0 6 * * 1"

jobs:
  fast:
    # Push / PR: fast unit tests only (skip the Aer-backed QAOA runs).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install -e . --no-deps
      - run: pytest -m "not slow"

  full:
    # Weekly schedule: the complete suite, including slow quantum end-to-end tests.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install -e . --no-deps
      - run: pytest
